name: Сборка PQ Nginx (OpenSSL статический + nginx)

on:
  workflow_dispatch:
    inputs:
      openssl_version:
        description: 'Версия OpenSSL'
        required: true
        default: '3.5.7'
      nginx_version:
        description: 'Версия nginx'
        required: true
        default: '1.28.3'
      push_release:
        description: 'Опубликовать как Release?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Сборка ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    permissions:
      contents: write

    steps:
      - name: Подготовка QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Подготовка Buildx
        uses: docker/setup-buildx-action@v3

      - name: Создание Dockerfile
        shell: bash
        run: |
          cat > Dockerfile.pq << 'EOF'
          FROM debian:11-slim AS builder

          ARG OPENSSL_VER
          ARG NGINX_VER
          ARG PREFIX=/opt/mtproxyl-nginx

          RUN apt-get update -qq && apt-get install -y -qq \
              build-essential wget ca-certificates \
              zlib1g-dev libpcre3-dev perl \
              && rm -rf /var/lib/apt/lists/*

          # OpenSSL — статическая сборка
          RUN cd /tmp && \
              wget -q "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VER}/openssl-${OPENSSL_VER}.tar.gz" && \
              tar xzf "openssl-${OPENSSL_VER}.tar.gz" && \
              cd "openssl-${OPENSSL_VER}" && \
              ./Configure no-shared no-tests \
                --prefix=/tmp/openssl-static \
                --openssldir=/tmp/openssl-static/ssl \
                --libdir=lib && \
              make -j"$(nproc)" && \
              make install_sw

          # Проверка OpenSSL
          RUN /tmp/openssl-static/bin/openssl version

          # nginx — статически линкуем OpenSSL
          RUN cd /tmp && \
              wget -q "https://nginx.org/download/nginx-${NGINX_VER}.tar.gz" && \
              tar xzf "nginx-${NGINX_VER}.tar.gz" && \
              cd "nginx-${NGINX_VER}" && \
              ./configure \
                --prefix=${PREFIX} \
                --conf-path=${PREFIX}/conf/nginx.conf \
                --error-log-path=/var/log/mtproxyl-nginx/error.log \
                --http-log-path=/var/log/mtproxyl-nginx/access.log \
                --pid-path=/run/mtproxyl-nginx.pid \
                --lock-path=/var/lock/mtproxyl-nginx.lock \
                --http-client-body-temp-path=/var/lib/mtproxyl-nginx/body \
                --http-proxy-temp-path=/var/lib/mtproxyl-nginx/proxy \
                --http-fastcgi-temp-path=/var/lib/mtproxyl-nginx/fastcgi \
                --with-http_ssl_module \
                --with-http_v2_module \
                --with-http_realip_module \
                --with-http_gzip_static_module \
                --with-http_stub_status_module \
                --with-http_sub_module \
                --with-threads \
                --with-pcre \
                --with-cc-opt="-I/tmp/openssl-static/include" \
                --with-ld-opt="-L/tmp/openssl-static/lib -Wl,-Bstatic -lssl -lcrypto -Wl,-Bdynamic" && \
              make -j"$(nproc)" && \
              make install

          # Копируем openssl бинарник (тоже статический)
          RUN cp /tmp/openssl-static/bin/openssl ${PREFIX}/bin/openssl

          # Проверка: nginx запускается
          RUN ${PREFIX}/sbin/nginx -V 2>&1

          # Проверка: openssl запускается
          RUN ${PREFIX}/bin/openssl version

          # Проверка: ssl/crypto НЕ в динамических зависимостях
          RUN ldd ${PREFIX}/sbin/nginx | grep -Ei 'ssl|crypto' && \
              (echo "ОШИБКА: OpenSSL слинкован динамически!" && exit 1) || \
              echo "OK: OpenSSL слинкован статически"

          # Проверка GLIBC
          RUN echo "Требуемая GLIBC:" && \
              objdump -T ${PREFIX}/sbin/nginx | grep -oP 'GLIBC_[0-9.]+' | sort -V | uniq | tail -1

          FROM scratch AS artifact
          COPY --from=builder /opt/mtproxyl-nginx /opt/mtproxyl-nginx
          EOF

      - name: Сборка архива ${{ matrix.arch }}
        shell: bash
        run: |
          mkdir -p out

          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg OPENSSL_VER=${{ github.event.inputs.openssl_version }} \
            --build-arg NGINX_VER=${{ github.event.inputs.nginx_version }} \
            --output type=local,dest=./out \
            -f Dockerfile.pq .

          ARCHIVE="mtproxyl-pq-nginx-${{ github.event.inputs.nginx_version }}-openssl${{ github.event.inputs.openssl_version }}-linux-${{ matrix.arch }}.tar.gz"
          tar czf "${ARCHIVE}" -C out opt/mtproxyl-nginx

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: pq-nginx-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}
          retention-days: 7

  release:
    name: Публикация Release
    needs: build
    if: github.event.inputs.push_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Скачать артефакты
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Показать файлы
        run: find artifacts -type f -maxdepth 3

      - name: Создать Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pq-nginx-${{ github.event.inputs.nginx_version }}-openssl${{ github.event.inputs.openssl_version }}
          name: "PQ Nginx ${{ github.event.inputs.nginx_version }} + OpenSSL ${{ github.event.inputs.openssl_version }}"
          body: |
            ## nginx ${{ github.event.inputs.nginx_version }} + OpenSSL ${{ github.event.inputs.openssl_version }} (статический)

            Собран для MTProxyL selfmask.
            OpenSSL слинкован **статически** — не требует установки OpenSSL на сервере.
            Поддерживает **X25519MLKEM768** для постквантового обмена ключами.

            ### Совместимость
            - Debian 11+ (Bullseye и новее)
            - Ubuntu 20.04+
            - RHEL/Rocky/Alma 9+ (возможно 8, не тестировалось)

            ### Архитектуры
            - `linux/amd64`
            - `linux/arm64`

            ### Установка
            MTProxyL selfmask скачивает и устанавливает автоматически.

            ### Ручная проверка
            ```bash
            tar xzf mtproxyl-pq-nginx-*.tar.gz -C /
            /opt/mtproxyl-nginx/bin/openssl version
            /opt/mtproxyl-nginx/sbin/nginx -V 2>&1 | grep openssl
            ldd /opt/mtproxyl-nginx/sbin/nginx | grep -E 'ssl|crypto'  # должно быть пусто
            ```
          files: |
            artifacts/pq-nginx-amd64/*.tar.gz
            artifacts/pq-nginx-arm64/*.tar.gz
          draft: false
          prerelease: false
